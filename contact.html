    <link rel="stylesheet" href="video-background.css">
</head>
<body>
    <!-- 视频背景 -->
    <div class="video-background">
        <video autoplay muted loop playsinline>
            <source src="videos/background.mp4" type="video/mp4">
        </video>
    </div>
    <div class="video-overlay"></div>
    
    <!-- 导航栏 -->
    <nav>
        <div class="container">
            <div class="logo">我的网站</div>
            <ul class="nav-links">

                <li><a href="about.html">关于我</a></li>

            </ul>
        </div>
    </nav>
    
    <!-- Page Hero -->
    <section class="page-hero">
        <div class="container">
            <div class="page-eyebrow fade-in fade-in-1">Contact</div>

        </div>

    <section class="content">
        <div class="container">
            <div class="section">
                <div class="contact-content">
                    <div class="card">

                        <br>

                        <p>• Twitter: @yourusername</p>
                        <br>

                    </div>
                </div>
            </div>
            
            <!-- 广告位 -->
            <div class="ad-space">
                <p>📢 广告位</p>
            </div>
        </div>
    </section>
    
    <!-- 页脚 -->
    <footer>
        <div class="container">
            <p>&copy; 2026 我的个人网站. All rights reserved.</p>
